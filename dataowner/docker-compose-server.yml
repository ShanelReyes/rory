services:
  rory-dataowner-0:
    image: shanelreyes/rory:dataowner
    container_name: rory-dataowner-0
    environment:
      - NODE_ID=rory-dataowner-0
      - TASK_ID=${TASK_ID}
      - TRACE_ID=${TRACE_ID}
      - EXPERIMENT_ITERATION=${EXPERIMENT_ITERATION}
      - MAX_RETRIES=${MAX_RETRIES}
      - MAX_THREADS=${MAX_THREADS}
      - DATASET_EXTENSION=${DATASET_EXTENSION}
      - TRACE_EXTENSION=${TRACE_EXTENSION}
      - SOURCE_PATH=/rory/source
      - SINK_PATH=/rory/sink
      - LOG_PATH=/rory/log
      - TRACE_PATH=/rory/source
      - CLIENT_TIMEOUT=300
      
    volumes:
      - /rory/rory-dataowner-0/source:/rory/source
      - /rory/rory-dataowner-0/sink:/rory/sink
      - /rory/rory-dataowner-0/log:/rory/log
    networks:
      - mictlanx
    deploy:
      restart_policy:
        condition: none
      labels:
        target: "rory"
      resources:
        limits:
          cpus: '5'
          memory: 10G
      placement:
        constraints:
          - "node.labels.index==0"
      

networks:
  mictlanx: 
    external: true
