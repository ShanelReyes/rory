services:
  rory-client-0:
    image: shanelreyes/rory:client
    container_name: rory-client-0
    hostname: rory-client-0
    ports:
      - 3000:3000
    environment:
      - NODE_ID=rory-client-0
      - NODE_PORT=3000
      - NODE_IP_ADDR=rory-client-0
      - SERVER_IP_ADDR=0.0.0.0
      - RORY_MANAGER_IP_ADDR=rory-manager-0
      - RORY_MANAGER_PORT=6000
      - LOGGER_NAME=rory-client-0
      - MAX_ITERATIONS=10
      - NUM_CHUNKS=4
      - MAX_WORKERS=1
      - MAX_THREADS=3
      - XOLO_ENABLE=0
      - DEBUG =0
      - RELOAD=0
      - LIU_ROUND=1
      - TESTING=0
      - M=3
      - MICTLANX_PEERS=mictlanx-peer-0:mictlanx-peer-0:7000 mictlanx-peer-1:mictlanx-peer-1:7001
      - CUSTOM_PYTHON_PATH=/app
      - SOURCE_PATH=/rory/source
      - SINK_PATH=/rory/sink
      - LOG_PATH=/rory/log
    volumes:
      - /rory/rory-client-0/source:/rory/source
      - /rory/rory-client-0/sink:/rory/sink
      - /rory/rory-client-0/log:/rory/log
    networks:
      - mictlanx
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 32G
      placement:
        constraints:
          - "node.labels.index==5"

  rory-manager-0:
    image: shanelreyes/rory:manager
    container_name: rory-manager-0
    hostname: rory-manager-0
    ports:
      - 6000:6000
    environment:
      - NODE_ID=rory-manager-0
      - NODE_PORT=6000
      - NODE_IP_ADDR=rory-manager-0
      - SERVER_IP_ADDR=0.0.0.0
      - INIT_WORKERS=2
      - WORKER_INIT_PORT=9000
      - DOCKER_IMAGE_NAME=shanelreyes/rory
      - DOCKER_IMAGE_TAG=worker
      - DEBUG=0
      - RELOAD=0
      - TESTING=0
      - MAX_RETRIES=10
      - MAX_THREADS=1
      - WORKER_MAX_THREADS=2
      - LOAD_BALANCING=0
      - WORKER_MEMORY=10000000000
      - MICTLANX_SUMMONER_IP_ADDR=mictlanx-summoner-0
      - MICTLANX_SUMMONER_PORT=15000
      - MICTLANX_SUMMONER_MODE=docker
      - MICTLANX_SUMMONER_API_VERSION=3
      - MICTLANX_PEERS=mictlanx-peer-0:mictlanx-peer-0:7000 mictlanx-peer-1:mictlanx-peer-1:7001
      - CUSTOM_PYTHON_PATH=/app
      - LOGGER_NAME=rory-manager-0
      - SOURCE_PATH=/rory/source
      - SINK_PATH=/rory/sink
      - LOG_PATH=/rory/log
      - WORKER_BASE_PATH=/rory
      - XOLO_ENABLE=0
    volumes:
      - /rory/rory-manager-0/source:/rory/source
      - /rory/rory-manager-0/sink:/rory/sink
      - /rory/rory-manager-0/log:/rory/log
    networks:
      - mictlanx
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
      placement:
        constraints:
          - "node.labels.index==6"
networks:
  mictlanx:
    external: true
